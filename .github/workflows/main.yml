name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 拉取仓库代码
      uses: actions/checkout@v5

    - name: 安装 Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: 安装 Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: 安装系统依赖
      run: |
        sudo apt update
        sudo apt install -y \
        git zip unzip openjdk-17-jdk \
        python3-pip autoconf libtool \
        pkg-config zlib1g-dev \
        libncurses5-dev libncursesw5-dev \
        libtinfo5 cmake libffi-dev \
        libssl-dev

    - name: 初始化 Buildozer
      run: |
        buildozer init

    - name: 修改 buildozer.spec
      run: |
        sed -i 's/source.include_exts = py,png,jpg,kv,atlas/source.include_exts = py,png,jpg,kv,atlas,ttf/' buildozer.spec
        sed -i 's/title = My Application/title = LordGame/' buildozer.spec
        sed -i 's/package.name = myapp/package.name = lordgame/' buildozer.spec
        sed -i 's/package.domain = org.test/package.domain = org.lordgame/' buildozer.spec
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy/' buildozer.spec

    - name: 开始打包 APK
      run: |
        buildozer android debug

    - name: 上传 APK
      uses: actions/upload-artifact@v4
      with:
        name: lordgame-apk
        path: bin/*.apk
